<app-header></app-header>

<!-- Decorative animated elements -->
<div class="decorative-elements">
  <div class="floating-circle circle-1"></div>
  <div class="floating-circle circle-2"></div>
  <div class="floating-circle circle-3"></div>
  <div class="floating-circle circle-4"></div>
  <div class="floating-diamond diamond-1"></div>
  <div class="floating-diamond diamond-2"></div>
  <div class="floating-line line-1"></div>
  <div class="floating-line line-2"></div>
  <div class="pulsing-dot dot-1"></div>
  <div class="pulsing-dot dot-2"></div>
  <div class="pulsing-dot dot-3"></div>
</div>

<div class="faqs-container animate-fade-in-up">
  <div class="protector-breadcrumb">
    <a class="breadcrumb-link" routerLink="/">Home</a>
    <span class="breadcrumb-separator">/</span>
    <a class="breadcrumb-link">Media Center</a>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-current">FAQs</span>
  </div>
  <h1 class="faqs-title">Frequently Asked Questions</h1>

  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p>Loading FAQs...</p>
  </div>

  <div *ngIf="!isLoading && categories.length === 0" class="empty-state">
    <p>No FAQs available at this time.</p>
  </div>

  <div class="faq-categories" *ngIf="!isLoading && categories.length > 0">
    <div class="faq-category" *ngFor="let category of categories">
      <h3 class="category-header">
        <span class="category-icon" *ngIf="category.icon">
          <i [class]="'fas ' + category.icon"></i>
        </span>
        {{category.name}}
      </h3>

      <div class="faq-list">
        <div class="faq-item" *ngFor="let faq of category.faqs">
          <div class="faq-question" (click)="toggleFaq(faq)">
            <span class="question-text">{{faq.question}}</span>
            <span class="toggle-icon" [class.expanded]="faq.isExpanded">&#9660;</span>
          </div>
          <div class="faq-answer" [class.expanded]="faq.isExpanded">
            <span class="answer-text">{{faq.answer}}</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section class="faqs-section" *ngIf="!isLoading">
    <h2 class="faqs-section-title">Need More Help?</h2>
    <div class="help-options">
      <div class="help-item">
        <div class="help-icon">
          <i class="fas fa-phone-alt"></i>
        </div>
        <div class="help-content">
          <h3 class="help-title">Call Us</h3>
          <p class="help-description">Speak directly with our support team</p>
          <span class="help-value">{{phone}}</span>
        </div>
      </div>
      <div class="help-item">
        <div class="help-icon">
          <i class="fas fa-envelope"></i>
        </div>
        <div class="help-content">
          <h3 class="help-title">Email Support</h3>
          <p class="help-description">Send us your detailed questions</p>
          <span class="help-value">{{email}}</span>
        </div>
      </div>
    </div>
  </section>
</div>

<app-footer></app-footer>
