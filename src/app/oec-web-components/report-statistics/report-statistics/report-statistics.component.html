<app-header></app-header>

<!-- Decorative animated elements -->
<div class="decorative-elements">
  <div class="floating-circle circle-1"></div>
  <div class="floating-circle circle-2"></div>
  <div class="floating-circle circle-3"></div>
  <div class="floating-circle circle-4"></div>
  <div class="floating-diamond diamond-1"></div>
  <div class="floating-diamond diamond-2"></div>
  <div class="floating-line line-1"></div>
  <div class="floating-line line-2"></div>
  <div class="pulsing-dot dot-1"></div>
  <div class="pulsing-dot dot-2"></div>
  <div class="pulsing-dot dot-3"></div>
</div>

<div class="report-statistics-container animate-fade-in-up">
  <div class="protector-breadcrumb">
    <a class="breadcrumb-link" routerLink="/">Home</a>
    <span class="breadcrumb-separator">/</span>
    <span class="breadcrumb-current">Reports & Analytics</span>
  </div>

  <h1 class="report-statistics-title">Reports & Analytics</h1>

  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p>Loading documents...</p>
  </div>

  <div *ngIf="!isLoading && sections.length === 0" class="empty-state">
    <i class="fas fa-folder-open empty-icon"></i>
    <p>No documents available at this time.</p>
  </div>

  <div *ngIf="!isLoading && sections.length > 0">
    <section *ngFor="let section of sections" class="report-section">
      <div class="section-header">
        <i class="fas fa-chart-bar section-icon"></i>
        {{ section.name }}
      </div>
      <table class="documents-table">
        <thead>
          <tr>
            <th class="col-num">#</th>
            <th class="col-title">Document Title</th>
            <th class="col-download">Download</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let doc of section.documents; let i = index">
            <td>{{ i + 1 }}</td>
            <td>{{ doc.title }}</td>
            <td>
              <a *ngIf="doc.pdf_url" [href]="getFileUrl(doc.pdf_url)" target="_blank" class="download-btn">
                <i class="fas fa-download"></i> Download
              </a>
              <span *ngIf="!doc.pdf_url" class="no-file">—</span>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</div>

<app-footer></app-footer>
